# Cloud Build config for SFT training image
# Uses Dockerfile.train (not the production Dockerfile)
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.train'
      - '-t'
      - '${_IMAGE_URI}'
      - '--cache-from'
      - '${_IMAGE_URI}'
      - '.'

images:
  - '${_IMAGE_URI}'

timeout: '3600s'

options:
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _IMAGE_URI: 'us-central1-docker.pkg.dev/purchasing-automation/purchasing-automation/sft-trainer:latest'
